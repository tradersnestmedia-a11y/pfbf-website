<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFBF Admin - Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .data-box { background: #f3f4f6; padding: 15px; border-radius: 5px; margin: 10px 0; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; }
        .success { background: #10b981; color: white; }
        .error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 PFBF Supabase Debug Tool</h1>
        <p>Testing connection to Supabase...</p>
        
        <button onclick="testConnection()">Test Connection</button>
        <button onclick="loadData()">Load Data</button>
        <button onclick="addTestData()">Add Test Data</button>
        
        <div id="status" class="status">Ready</div>
        <div id="output" class="data-box"><pre>Click a button to test...</pre></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ejxzbxlvqougraxuatsq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CDHrNuD2u0O5uf3QWYLJ5g_CaYIz4WS';
        
        // Create client once
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status';
            if (type === 'success') statusEl.classList.add('success');
            if (type === 'error') statusEl.classList.add('error');
        }
        
        async function testConnection() {
            setStatus('Testing connection...', 'info');
            try {
                const { data, error } = await supabaseClient.from('sermons').select('count');
                if (error) throw error;
                setStatus('✅ Connection successful!', 'success');
                document.getElementById('output').innerHTML = `<pre>✅ Connected to Supabase!\nCount: ${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                setStatus('❌ Connection failed: ' + error.message, 'error');
                document.getElementById('output').innerHTML = `<pre>❌ Error: ${error.message}</pre>`;
            }
        }
        
        async function loadData() {
            setStatus('Loading data...', 'info');
            try {
                const [sermons, events, testimonies] = await Promise.all([
                    supabaseClient.from('sermons').select('*'),
                    supabaseClient.from('events').select('*'),
                    supabaseClient.from('testimonies').select('*')
                ]);
                
                if (sermons.error) throw sermons.error;
                if (events.error) throw events.error;
                if (testimonies.error) throw testimonies.error;
                
                const output = {
                    sermons: sermons.data,
                    events: events.data,
                    testimonies: testimonies.data
                };
                
                setStatus(`✅ Loaded ${sermons.data.length} sermons, ${events.data.length} events, ${testimonies.data.length} testimonies`, 'success');
                document.getElementById('output').innerHTML = `<pre>${JSON.stringify(output, null, 2)}</pre>`;
            } catch (error) {
                setStatus('❌ Load failed: ' + error.message, 'error');
                document.getElementById('output').innerHTML = `<pre>❌ Error: ${error.message}</pre>`;
            }
        }
        
        async function addTestData() {
            setStatus('Adding test data...', 'info');
            try {
                const { data, error } = await supabaseClient
                    .from('sermons')
                    .insert([{
                        title: 'Test Sermon ' + new Date().toLocaleTimeString(),
                        speaker: 'Test Speaker',
                        date: new Date().toISOString().split('T')[0],
                        description: 'This is a test sermon added from the debug tool.'
                    }]);
                
                if (error) throw error;
                setStatus('✅ Test sermon added!', 'success');
                document.getElementById('output').innerHTML = `<pre>✅ Added test sermon: ${JSON.stringify(data, null, 2)}</pre>`;
                loadData();
            } catch (error) {
                setStatus('❌ Add failed: ' + error.message, 'error');
                document.getElementById('output').innerHTML = `<pre>❌ Error: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
